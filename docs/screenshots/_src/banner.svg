<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.6" stop-color="#3b3b80"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <circle cx="1180" cy="60" r="80" fill="#c4b5fd" opacity="0.15" filter="url(#glow)"/>
  <circle cx="120" cy="280" r="80" fill="#7c3aed" opacity="0.2" filter="url(#glow)"/>

  <!-- Logo + wordmark + tagline horizontally -->
  <g transform="translate(80, 100)">
    <g stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="22" cy="16" r="11" fill="#ffffff"/>
      <circle cx="22" cy="100" r="11" fill="#ffffff"/>
      <circle cx="86" cy="58" r="11" fill="#ffffff"/>
      <line x1="22" y1="27" x2="22" y2="89"/>
      <path d="M 22 58 C 22 80 56 100 78 90"/>
      <path d="M 22 58 C 22 36 56 16 78 26"/>
    </g>

    <text x="138" y="56" font-family="-apple-system, sans-serif" font-weight="800" font-size="76" letter-spacing="-2" fill="url(#wordmark)">Rebased</text>
    <text x="140" y="98" font-family="-apple-system, sans-serif" font-weight="500" font-size="22" fill="#c4b5fd" opacity="0.95">JetBrains-style Git client for VS Code</text>
  </g>

  <!-- Feature chips -->
  <g transform="translate(760, 130)" font-family="-apple-system" font-size="13" font-weight="600" fill="#ffffff">
    <rect width="148" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="74" y="19" text-anchor="middle">Interactive Rebase</text>

    <rect x="158" width="120" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="218" y="19" text-anchor="middle">Log Graph</text>

    <rect x="288" width="148" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="362" y="19" text-anchor="middle">Update Project</text>
  </g>

  <g transform="translate(760, 168)" font-family="-apple-system" font-size="13" font-weight="600" fill="#ffffff">
    <rect width="120" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="60" y="19" text-anchor="middle">Changelists</text>

    <rect x="130" width="148" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="204" y="19" text-anchor="middle">Local History</text>

    <rect x="288" width="148" height="28" rx="14" fill="#ffffff" opacity="0.16"/>
    <text x="362" y="19" text-anchor="middle">Hunk Staging</text>
  </g>
</svg>
