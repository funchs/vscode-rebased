<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <style>
      .title-bar { fill: #3c3c3c; }
      .status-bar { fill: #007acc; }
      .text { fill: #cccccc; font-family: -apple-system, "SF Pro Text", sans-serif; font-size: 13px; }
      .text-sub { fill: #858585; font-family: -apple-system; font-size: 11px; }
      .quickpick-bg { fill: #252526; stroke: #454545; stroke-width: 1; }
      .quickpick-input { fill: #3c3c3c; }
      .quickpick-selected { fill: #094771; }
      .qp-text { fill: #cccccc; font-family: -apple-system; font-size: 13px; }
      .qp-desc { fill: #858585; font-family: -apple-system; font-size: 12px; }
      .codicon { fill: #6cb6ff; font-family: monospace; font-size: 13px; }
    </style>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="750" fill="#1e1e1e"/>
  <rect width="1200" height="30" class="title-bar"/>
  <circle cx="18" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="58" cy="15" r="6" fill="#28c840"/>
  <text x="600" y="20" text-anchor="middle" class="text-sub">demo-project — apps/web/handlers.ts</text>

  <!-- Faint editor visible behind -->
  <g transform="translate(48, 90)" opacity="0.45" font-family="SF Mono, Menlo, monospace" font-size="13">
    <text x="44" y="0" fill="#6c6c6c">1</text>
    <text x="80" y="0" fill="#cccccc">import { rotate } from '../auth';</text>
    <text x="44" y="22" fill="#6c6c6c">2</text>
    <text x="44" y="44" fill="#6c6c6c">3</text>
    <text x="80" y="44" fill="#cccccc">export async function getUser(id: string) {</text>
    <text x="44" y="66" fill="#6c6c6c">4</text>
    <text x="80" y="66" fill="#cccccc">  return { id, name: 'demo' };</text>
    <text x="44" y="88" fill="#6c6c6c">5</text>
    <text x="80" y="88" fill="#cccccc">}</text>
  </g>

