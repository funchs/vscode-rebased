# Release workflow — triggered when a v*.*.* tag is pushed.
# Builds the vsix, optionally publishes to VS Code Marketplace and/or Open VSX
# depending on which secrets are set, and attaches the vsix to the GitHub release.
# No untrusted github.event.* values flow into run:.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Surface which publishers are configured for this run. Secrets are not
    # available in `if:` at the step level, so we expose presence via env.
    env:
      HAS_VSCE_PAT: ${{ secrets.VSCE_PAT != '' }}
      HAS_OVSX_PAT: ${{ secrets.OVSX_PAT != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          npm test

      - name: Package
        run: npx --yes @vscode/vsce package --no-yarn --allow-missing-repository

      - name: Publish to VS Code Marketplace
        if: env.HAS_VSCE_PAT == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath *.vsix --no-yarn

      - name: Publish to Open VSX
        if: env.HAS_OVSX_PAT == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish *.vsix

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
