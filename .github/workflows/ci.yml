# All workflow inputs in this file come from matrix values and repo-controlled
# inputs only. No use of untrusted github.event.* string interpolation in run:.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
        with:
          # Smoke test reads this repo's own commit history; default shallow clone gives only 1 commit.
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          npm test
        shell: bash

      - name: Package
        run: npx --yes @vscode/vsce package --no-yarn --allow-missing-repository

      - name: Upload vsix
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: '*.vsix'
          if-no-files-found: error
