version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm"]
    groups:
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      types:
        patterns: ["@types/*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
