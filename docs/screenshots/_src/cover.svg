<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#3b3b80"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <style>
      .wordmark { font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif; font-weight: 800; letter-spacing: -2px; }
      .tagline { font-family: -apple-system, "SF Pro Text", sans-serif; font-weight: 500; }
      .feature { font-family: -apple-system, "SF Pro Text", sans-serif; font-weight: 600; }
      .feature-desc { font-family: -apple-system, sans-serif; font-weight: 400; }
      .mono { font-family: "SF Mono", Menlo, monospace; }
      .chip { font-family: "SF Mono", Menlo, monospace; font-weight: 700; }
    </style>
  </defs>

  <!-- Background gradient -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative dot grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="100" cy="80" r="2"/><circle cx="200" cy="80" r="2"/><circle cx="300" cy="80" r="2"/>
    <circle cx="100" cy="180" r="2"/><circle cx="200" cy="180" r="2"/>
    <circle cx="1100" cy="80" r="2"/><circle cx="1180" cy="80" r="2"/>
    <circle cx="1100" cy="540" r="2"/><circle cx="1180" cy="540" r="2"/>
  </g>

  <!-- Left side: branding -->
  <g transform="translate(80, 130)">
    <!-- Logo glyph -->
    <g transform="translate(0, -10)" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="20" cy="14" r="10" fill="#ffffff"/>
      <circle cx="20" cy="86" r="10" fill="#ffffff"/>
      <circle cx="76" cy="50" r="10" fill="#ffffff"/>
      <line x1="20" y1="24" x2="20" y2="76"/>
      <path d="M 20 50 C 20 70 50 86 70 78"/>
      <path d="M 20 50 C 20 30 50 14 70 22"/>
    </g>

    <!-- Wordmark + tagline -->
    <text x="118" y="40" class="wordmark" font-size="84" fill="url(#wordmark)">Rebased</text>
    <text x="120" y="78" class="tagline" font-size="22" fill="#c4b5fd" opacity="0.95">
      JetBrains-style Git client for VS Code
    </text>

    <!-- Feature bullets -->
    <g transform="translate(0, 170)" fill="#ffffff">
      <g transform="translate(0, 0)">
        <text class="feature" font-size="20" opacity="0.95">⇄  Drag-and-drop interactive rebase</text>
      </g>
      <g transform="translate(0, 44)">
        <text class="feature" font-size="20" opacity="0.95">🌿  Swim-lane log graph &amp; commit details</text>
      </g>
      <g transform="translate(0, 88)">
        <text class="feature" font-size="20" opacity="0.95">⌥T  Update Project — stash, fetch, pull, pop</text>
      </g>
      <g transform="translate(0, 132)">
        <text class="feature" font-size="20" opacity="0.95">📋  Changelists, local history, hunk staging</text>
      </g>
      <g transform="translate(0, 176)">
        <text class="feature" font-size="20" opacity="0.95">🇨🇳  Conventional Commits validator (zh / en)</text>
      </g>
    </g>

    <!-- Badges -->
    <g transform="translate(0, 410)" font-family="-apple-system" font-size="13" font-weight="600">
      <rect width="110" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
      <text x="55" y="17" text-anchor="middle" fill="#ffffff">Open VSX 0.1.4</text>

      <rect x="120" width="68" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
      <text x="154" y="17" text-anchor="middle" fill="#ffffff">MIT</text>

      <rect x="198" width="120" height="26" rx="13" fill="#ffffff" opacity="0.18"/>
      <text x="258" y="17" text-anchor="middle" fill="#ffffff">47 tests passing</text>
    </g>
  </g>

  <!-- Right side: mock UI — stylized rebase view -->
  <g transform="translate(720, 90)">
    <!-- Window chrome -->
    <rect width="500" height="460" rx="12" fill="#1e1e1e"/>
    <rect width="500" height="36" rx="12" fill="#252526"/>
    <rect y="24" width="500" height="12" fill="#252526"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>
    <text x="250" y="22" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#858585">Interactive Rebase</text>

    <!-- Title -->
    <text x="28" y="78" font-family="-apple-system" font-size="18" font-weight="600" fill="#cccccc">6 commits in plan</text>

    <!-- Rows -->
    <g transform="translate(20, 100)">
      <!-- pick -->
      <rect width="460" height="42" rx="6" fill="#2a2d2e"/>
      <text x="14" y="27" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="9" width="64" height="24" rx="3" fill="#2ea043"/>
      <text x="68" y="25" text-anchor="middle" class="chip" font-size="11" fill="white">PICK</text>
      <text x="116" y="27" class="mono" font-size="12" fill="#d18616">5193e9d</text>
      <text x="200" y="27" font-family="-apple-system" font-size="13" fill="#cccccc">feat(api): pagination</text>

      <!-- reword (highlighted) -->
      <rect y="52" width="460" height="42" rx="6" fill="#094771"/>
      <text x="14" y="79" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="61" width="64" height="24" rx="3" fill="#0969da"/>
      <text x="68" y="77" text-anchor="middle" class="chip" font-size="11" fill="white">REWORD</text>
      <text x="116" y="79" class="mono" font-size="12" fill="#d18616">8a2c1f0</text>
      <text x="200" y="79" font-family="-apple-system" font-size="13" fill="#cccccc">feat(api): list endpoint</text>

      <!-- squash -->
      <rect y="104" width="460" height="42" rx="6" fill="#2a2d2e"/>
      <text x="14" y="131" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="113" width="64" height="24" rx="3" fill="#8957e5"/>
      <text x="68" y="129" text-anchor="middle" class="chip" font-size="11" fill="white">SQUASH</text>
      <text x="116" y="131" class="mono" font-size="12" fill="#d18616">cb71e30</text>
      <text x="200" y="131" font-family="-apple-system" font-size="13" fill="#cccccc">perf(parser): batch reads</text>

      <!-- edit -->
      <rect y="156" width="460" height="42" rx="6" fill="#2a2d2e"/>
      <text x="14" y="183" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="165" width="64" height="24" rx="3" fill="#d1ad06"/>
      <text x="68" y="181" text-anchor="middle" class="chip" font-size="11" fill="white">EDIT</text>
      <text x="116" y="183" class="mono" font-size="12" fill="#d18616">f234bb8</text>
      <text x="200" y="183" font-family="-apple-system" font-size="13" fill="#cccccc">perf(parser): inline hot path</text>

      <!-- drop (struck through) -->
      <rect y="208" width="460" height="42" rx="6" fill="#2a2d2e"/>
      <text x="14" y="235" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="217" width="64" height="24" rx="3" fill="#cf222e"/>
      <text x="68" y="233" text-anchor="middle" class="chip" font-size="11" fill="white">DROP</text>
      <text x="116" y="235" class="mono" font-size="12" fill="#d18616" text-decoration="line-through" opacity="0.55">d8f0c2e</text>
      <text x="200" y="235" font-family="-apple-system" font-size="13" fill="#cccccc" text-decoration="line-through" opacity="0.55">chore: deprecated migration</text>

      <!-- fixup -->
      <rect y="260" width="460" height="42" rx="6" fill="#2a2d2e"/>
      <text x="14" y="287" fill="#858585" font-family="monospace" font-size="14">⋮⋮</text>
      <rect x="36" y="269" width="64" height="24" rx="3" fill="#8957e5"/>
      <text x="68" y="285" text-anchor="middle" class="chip" font-size="11" fill="white">FIXUP</text>
      <text x="116" y="287" class="mono" font-size="12" fill="#d18616">0d44a91</text>
      <text x="200" y="287" font-family="-apple-system" font-size="13" fill="#cccccc">fix(auth): rotate tokens</text>
    </g>

    <!-- Primary button -->
    <rect x="20" y="408" width="180" height="34" rx="4" fill="#0e639c"/>
    <text x="110" y="430" text-anchor="middle" font-family="-apple-system" font-size="13" font-weight="500" fill="white">Start Rebase  (⌘⏎)</text>

    <!-- Glass overlay for polish -->
    <rect width="500" height="200" fill="url(#cardGlass)" rx="12"/>
  </g>

  <!-- Soft glow accent in corner -->
  <circle cx="1180" cy="100" r="80" fill="#c4b5fd" opacity="0.15" filter="url(#glow)"/>
  <circle cx="100" cy="560" r="100" fill="#7c3aed" opacity="0.18" filter="url(#glow)"/>
</svg>
